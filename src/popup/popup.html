<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intent Classifier</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 16px;
        width: 320px;
        color: #1f2937;
        background: #f8fafc;
      }

      h1 {
        font-size: 18px;
        margin: 0 0 12px;
      }

      h2 {
        font-size: 14px;
        margin: 0 0 10px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      textarea {
        width: 100%;
        min-height: 96px;
        box-sizing: border-box;
        resize: vertical;
        padding: 8px;
        font: inherit;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
      }

      button {
        margin-top: 12px;
        width: 100%;
        padding: 10px 12px;
        border: 0;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      .card {
        margin-top: 14px;
        padding: 12px;
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      }

      .metric {
        margin: 0 0 6px;
        font-size: 13px;
      }

      .metric:last-child {
        margin-bottom: 0;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Current intent</h1>
    <label for="intent-input">Describe what you want to stay focused on.</label>
    <textarea id="intent-input" placeholder="Example: research chrome extension content scripts and storage APIs"></textarea>
    <button id="save-intent" type="button">Save intent</button>
    <div class="status" id="status-message" aria-live="polite"></div>

    <section class="card" aria-live="polite">
      <h2>Active page</h2>
      <p class="metric" id="page-status">No page classification available yet.</p>
      <p class="metric" id="page-score">Score: —</p>
      <p class="metric" id="page-keywords">Matched keywords: none</p>
    </section>

    <script src="src/shared/intent-storage.js"></script>
    <script src="src/popup/popup.js"></script>
  </body>
</html>
